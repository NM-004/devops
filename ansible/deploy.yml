---
- name: Configure host and deploy to EKS
  hosts: devops
  become: false
  vars:
    aws_region: us-east-1
    eks_cluster_name: eks-food-delivery-dev
    container_registry: 111111111111.dkr.ecr.us-east-1.amazonaws.com
    namespace: food-delivery

  tasks:
    - name: Ensure kubectl is available
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Ensure aws cli is available
      ansible.builtin.command: aws --version
      register: aws_check
      changed_when: false

    - name: Fetch EKS credentials
      ansible.builtin.command: >-
        aws eks update-kubeconfig --region {{ aws_region }}
        --name {{ eks_cluster_name }}
      changed_when: true

    - name: Render manifests with ECR registry
      ansible.builtin.command: >-
        ../scripts/render-k8s-manifests.sh {{ container_registry }}
      changed_when: true

    - name: Create namespace
      ansible.builtin.command: kubectl apply -f ../k8s/generated/namespace.yaml
      changed_when: true

    - name: Apply deployments
      ansible.builtin.command: kubectl apply -f ../k8s/generated/deployment.yaml
      changed_when: true

    - name: Apply services
      ansible.builtin.command: kubectl apply -f ../k8s/generated/service.yaml
      changed_when: true

    - name: Verify pods
      ansible.builtin.command: kubectl get pods -n {{ namespace }}
      register: pods
      changed_when: false

    - name: Show pod status
      ansible.builtin.debug:
        var: pods.stdout_lines
