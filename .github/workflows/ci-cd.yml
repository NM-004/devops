name: Food Delivery CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  TF_IN_AUTOMATION: true
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'food-delivery-eks-dev' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'food-delivery' }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT || 'dev' }}
  NAMESPACE: food-delivery

jobs:
  # Stage 1: Validate Services
  test:
    name: Run Service Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [order-service, restaurant-service, delivery-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Run tests when present
        working-directory: services/${{ matrix.service }}
        run: npm run test --if-present

      - name: Syntax check entrypoint
        working-directory: services/${{ matrix.service }}
        run: node --check src/app.js

  # Stage 2: Provision Infrastructure
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: infrastructure/terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS account ID
        id: aws_account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Ensure Terraform state bucket
        run: |
          set -euo pipefail
          BUCKET_NAME="tfstate-${{ steps.aws_account.outputs.id }}-${{ env.AWS_REGION }}-food-delivery"
          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "State bucket exists: $BUCKET_NAME"
          else
            aws s3api create-bucket \
              --bucket "$BUCKET_NAME" \
              --region "${{ env.AWS_REGION }}" \
              --create-bucket-configuration LocationConstraint="${{ env.AWS_REGION }}"
          fi
          aws s3api put-bucket-versioning \
            --bucket "$BUCKET_NAME" \
            --versioning-configuration Status=Enabled
          echo "TF_STATE_BUCKET=$BUCKET_NAME" >> "$GITHUB_ENV"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=food-delivery/${{ env.ENVIRONMENT }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Import existing named resources into state
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_project_name: ${{ env.PROJECT_NAME }}
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_eks_cluster_name: ${{ env.EKS_CLUSTER_NAME }}
        run: |
          set -euo pipefail

          import_if_needed() {
            local addr="$1"
            local id="$2"
            if terraform state show "$addr" >/dev/null 2>&1; then
              echo "Already in state: $addr"
            else
              terraform import -input=false "$addr" "$id"
            fi
          }

          CLUSTER_ROLE="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-eks-cluster-role"
          NODE_ROLE="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-eks-node-role"

          if aws iam get-role --role-name "$CLUSTER_ROLE" >/dev/null 2>&1; then
            import_if_needed "aws_iam_role.eks_cluster" "$CLUSTER_ROLE"
          fi

          if aws iam get-role --role-name "$NODE_ROLE" >/dev/null 2>&1; then
            import_if_needed "aws_iam_role.eks_nodes" "$NODE_ROLE"
          fi

          if aws iam list-attached-role-policies --role-name "$CLUSTER_ROLE" --query 'AttachedPolicies[].PolicyArn' --output text 2>/dev/null | grep -q 'arn:aws:iam::aws:policy/AmazonEKSClusterPolicy'; then
            import_if_needed "aws_iam_role_policy_attachment.eks_cluster_policy" "$CLUSTER_ROLE/arn:aws:iam::aws:policy/AmazonEKSClusterPolicy"
          fi

          if aws iam list-attached-role-policies --role-name "$NODE_ROLE" --query 'AttachedPolicies[].PolicyArn' --output text 2>/dev/null | grep -q 'arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy'; then
            import_if_needed "aws_iam_role_policy_attachment.eks_worker_node_policy" "$NODE_ROLE/arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy"
          fi

          if aws iam list-attached-role-policies --role-name "$NODE_ROLE" --query 'AttachedPolicies[].PolicyArn' --output text 2>/dev/null | grep -q 'arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy'; then
            import_if_needed "aws_iam_role_policy_attachment.eks_cni_policy" "$NODE_ROLE/arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy"
          fi

          if aws iam list-attached-role-policies --role-name "$NODE_ROLE" --query 'AttachedPolicies[].PolicyArn' --output text 2>/dev/null | grep -q 'arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly'; then
            import_if_needed "aws_iam_role_policy_attachment.eks_ecr_readonly_policy" "$NODE_ROLE/arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly"
          fi

          for repo in order-service restaurant-service delivery-service; do
            if aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1; then
              import_if_needed "aws_ecr_repository.services[\"$repo\"]" "$repo"
            fi
          done

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_project_name: ${{ env.PROJECT_NAME }}
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_eks_cluster_name: ${{ env.EKS_CLUSTER_NAME }}

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_project_name: ${{ env.PROJECT_NAME }}
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_eks_cluster_name: ${{ env.EKS_CLUSTER_NAME }}

  # Stage 3: Build and Push Images
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [order-service, restaurant-service, delivery-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        id: ecr
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=$AWS_ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Set Docker image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "sha_tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "run_tag=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ matrix.service }}:${{ steps.tags.outputs.sha_tag }}
            ${{ steps.ecr.outputs.registry }}/${{ matrix.service }}:${{ steps.tags.outputs.run_tag }}
            ${{ steps.ecr.outputs.registry }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 4: Deploy to EKS
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        id: ecr
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=$AWS_ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Set EKS context
        run: aws eks update-kubeconfig --region "${{ env.AWS_REGION }}" --name "${{ env.EKS_CLUSTER_NAME }}"

      - name: Wait for EKS nodes to be Ready
        run: |
          kubectl get nodes -o wide
          kubectl wait --for=condition=Ready nodes --all --timeout=600s

      - name: Render Kubernetes manifests
        run: |
          chmod +x ./scripts/render-k8s-manifests.sh
          ./scripts/render-k8s-manifests.sh "${{ steps.ecr.outputs.registry }}"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/generated/namespace.yaml
          kubectl apply -f k8s/generated/deployment.yaml
          kubectl apply -f k8s/generated/service.yaml

      - name: Wait for rollouts
        run: |
          set -euo pipefail
          for d in order-service restaurant-service delivery-service; do
            echo "Waiting for deployment/$d..."
            if ! kubectl rollout status deployment/$d -n "${{ env.NAMESPACE }}" --timeout=600s; then
              echo "Rollout failed for deployment/$d. Collecting diagnostics..."
              kubectl get deployment/$d -n "${{ env.NAMESPACE }}" -o wide || true
              kubectl describe deployment/$d -n "${{ env.NAMESPACE }}" || true
              kubectl get rs -n "${{ env.NAMESPACE }}" -l app=$d -o wide || true
              kubectl get pods -n "${{ env.NAMESPACE }}" -l app=$d -o wide || true
              kubectl describe pods -n "${{ env.NAMESPACE }}" -l app=$d || true
              kubectl logs -n "${{ env.NAMESPACE }}" -l app=$d --all-containers --tail=100 || true
              kubectl get events -n "${{ env.NAMESPACE }}" --sort-by='.lastTimestamp' | tail -n 50 || true
              exit 1
            fi
          done

      - name: Debug deployment state
        if: always()
        run: |
          kubectl get pods -n "${{ env.NAMESPACE }}" -o wide
          kubectl get services -n "${{ env.NAMESPACE }}"
          kubectl get events -n "${{ env.NAMESPACE }}" --sort-by='.lastTimestamp' | tail -n 30

  # Stage 5: Post-Deploy Ansible Validation
  deploy_ansible:
    name: Run Ansible Deployment Validation
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && vars.RUN_ANSIBLE == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        id: ecr
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=$AWS_ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Set EKS context
        run: aws eks update-kubeconfig --region "${{ env.AWS_REGION }}" --name "${{ env.EKS_CLUSTER_NAME }}"

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Run Ansible playbook
        working-directory: ansible
        run: |
          ansible-playbook \
            -i inventory.ini.example \
            deploy.yml \
            -e "aws_region=${{ env.AWS_REGION }}" \
            -e "eks_cluster_name=${{ env.EKS_CLUSTER_NAME }}" \
            -e "container_registry=${{ steps.ecr.outputs.registry }}"
