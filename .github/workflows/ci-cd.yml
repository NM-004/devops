name: Food Delivery CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: food-delivery-eks-dev
  NAMESPACE: food-delivery

jobs:
  test:
    name: Run Service Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [order-service, restaurant-service, delivery-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Run tests if present
        working-directory: services/${{ matrix.service }}
        run: npm run test --if-present

  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [order-service, restaurant-service, delivery-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        id: ecr
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=$AWS_ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ matrix.service }}:latest

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        id: ecr
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=$AWS_ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Set EKS context
        run: aws eks update-kubeconfig --region "${{ env.AWS_REGION }}" --name "${{ env.EKS_CLUSTER_NAME }}"

      - name: Check cluster nodes
        run: |
          kubectl get nodes -o wide || true
          kubectl wait --for=condition=Ready nodes --all --timeout=300s

      - name: Render Kubernetes manifests
        run: |
          chmod +x ./scripts/render-k8s-manifests.sh
          ./scripts/render-k8s-manifests.sh "${{ steps.ecr.outputs.registry }}"

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/generated/namespace.yaml
          kubectl apply -f k8s/generated/deployment.yaml
          kubectl apply -f k8s/generated/service.yaml

      - name: Wait for rollout
        run: |
          set -euo pipefail
          for svc in order-service restaurant-service delivery-service; do
            echo "Waiting for deployment/$svc"
            if ! kubectl rollout status deployment/$svc -n "${{ env.NAMESPACE }}" --timeout=600s; then
              echo "Rollout failed for $svc. Collecting diagnostics..."
              kubectl get nodes -o wide || true
              kubectl get pods -n "${{ env.NAMESPACE }}" -o wide || true
              kubectl describe deployment/$svc -n "${{ env.NAMESPACE }}" || true
              kubectl describe pods -n "${{ env.NAMESPACE }}" -l app=$svc || true
              kubectl logs -n "${{ env.NAMESPACE }}" -l app=$svc --all-containers --tail=100 || true
              kubectl get events -n "${{ env.NAMESPACE }}" --sort-by='.lastTimestamp' | tail -n 50 || true
              exit 1
            fi
          done
