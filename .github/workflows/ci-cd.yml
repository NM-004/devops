name: Food Delivery CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  TF_IN_AUTOMATION: true
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'food-delivery-eks-dev' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'food-delivery' }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT || 'dev' }}
  NAMESPACE: food-delivery

jobs:
  # Stage 1: Validate Services
  test:
    name: Run Service Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [order-service, restaurant-service, delivery-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Run tests when present
        working-directory: services/${{ matrix.service }}
        run: npm run test --if-present

      - name: Syntax check entrypoint
        working-directory: services/${{ matrix.service }}
        run: node --check src/app.js

  # Stage 2: Provision Infrastructure
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: infrastructure/terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect Terraform changes
        id: tf_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'infrastructure/terraform/**'

      - name: Configure AWS credentials
        if: steps.tf_changes.outputs.terraform == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        if: steps.tf_changes.outputs.terraform == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        if: steps.tf_changes.outputs.terraform == 'true'
        run: terraform init

      - name: Terraform validate
        if: steps.tf_changes.outputs.terraform == 'true'
        run: terraform validate

      - name: Terraform plan
        if: steps.tf_changes.outputs.terraform == 'true'
        run: terraform plan -input=false
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_project_name: ${{ env.PROJECT_NAME }}
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_eks_cluster_name: ${{ env.EKS_CLUSTER_NAME }}

      - name: Terraform apply
        if: steps.tf_changes.outputs.terraform == 'true'
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_project_name: ${{ env.PROJECT_NAME }}
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_eks_cluster_name: ${{ env.EKS_CLUSTER_NAME }}

      - name: Skip Terraform apply when no infra changes
        if: steps.tf_changes.outputs.terraform != 'true'
        run: echo "No changes in infrastructure/terraform; skipping Terraform."

  # Stage 3: Build and Push Images
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [order-service, restaurant-service, delivery-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        id: ecr
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=$AWS_ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Set Docker image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "sha_tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "run_tag=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ matrix.service }}:${{ steps.tags.outputs.sha_tag }}
            ${{ steps.ecr.outputs.registry }}/${{ matrix.service }}:${{ steps.tags.outputs.run_tag }}
            ${{ steps.ecr.outputs.registry }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 4: Deploy to EKS
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        id: ecr
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=$AWS_ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Set EKS context
        run: aws eks update-kubeconfig --region "${{ env.AWS_REGION }}" --name "${{ env.EKS_CLUSTER_NAME }}"

      - name: Render Kubernetes manifests
        run: |
          chmod +x ./scripts/render-k8s-manifests.sh
          ./scripts/render-k8s-manifests.sh "${{ steps.ecr.outputs.registry }}"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/generated/namespace.yaml
          kubectl apply -f k8s/generated/deployment.yaml
          kubectl apply -f k8s/generated/service.yaml

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/order-service -n "${{ env.NAMESPACE }}" --timeout=300s
          kubectl rollout status deployment/restaurant-service -n "${{ env.NAMESPACE }}" --timeout=300s
          kubectl rollout status deployment/delivery-service -n "${{ env.NAMESPACE }}" --timeout=300s

      - name: Debug deployment state
        if: always()
        run: |
          kubectl get pods -n "${{ env.NAMESPACE }}" -o wide
          kubectl get services -n "${{ env.NAMESPACE }}"
          kubectl get events -n "${{ env.NAMESPACE }}" --sort-by='.lastTimestamp' | tail -n 30

  # Stage 5: Post-Deploy Ansible Validation
  deploy_ansible:
    name: Run Ansible Deployment Validation
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && vars.RUN_ANSIBLE == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        id: ecr
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=$AWS_ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Set EKS context
        run: aws eks update-kubeconfig --region "${{ env.AWS_REGION }}" --name "${{ env.EKS_CLUSTER_NAME }}"

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Run Ansible playbook
        working-directory: ansible
        run: |
          ansible-playbook \
            -i inventory.ini.example \
            deploy.yml \
            -e "aws_region=${{ env.AWS_REGION }}" \
            -e "eks_cluster_name=${{ env.EKS_CLUSTER_NAME }}" \
            -e "container_registry=${{ steps.ecr.outputs.registry }}"
